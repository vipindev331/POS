name: pos_app
description: "Enterprise Retail Billing & POS — offline-first Flutter client."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management (MVVM/ViewModel = Cubit)
  flutter_bloc: ^9.0.0
  equatable: ^2.0.7

  # Navigation
  go_router: ^14.6.2

  # Dependency injection
  get_it: ^8.0.3

  # Networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.0

  # Local persistence
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  shared_preferences: ^2.3.3

  # Web (drift wasm worker access)
  web: ^1.1.0

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

  # Receipt QR (pure Dart, generates SVG/bytes; no native deps)
  barcode: ^2.2.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0

flutter:
  uses-material-design: true
